name: Sync AUR Packages

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  check-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests packaging

      - name: Run Update Script
        id: update_script
        run: python scripts/update_packages.py

      - name: Deploy Updates to AUR
        if: steps.update_script.outputs.updated_dirs != ''
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          # Configuração do agente SSH
          mkdir -p ~/.ssh
          echo "$AUR_SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -t ed25519 aur.archlinux.org >> ~/.ssh/known_hosts

          git config --global user.name "Higor Silva"
          git config --global user.email "higor.slva@outlook.com"

          WORKDIR=$(mktemp -d)

          IFS=',' read -ra DIRS <<< "${{ steps.update_script.outputs.updated_dirs }}"
          for DIR in "${DIRS[@]}"; do
            echo "Processando $DIR..."
            
            git clone "ssh://aur@aur.archlinux.org/$DIR.git" "$WORKDIR/$DIR"
            
            cp "$DIR/PKGBUILD" "$WORKDIR/$DIR/PKGBUILD"
            
            docker run --rm -v "$WORKDIR:/pkg" archlinux:latest bash -c "
              pacman -Sy --noconfirm binutils sudo &&
              useradd -m builder &&
              echo 'builder ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers &&
              chmod -R 777 /pkg &&
              cd /pkg/$DIR &&
              sudo -u builder makepkg --printsrcinfo > .SRCINFO
            "
            
            cd "$WORKDIR/$DIR"
            if [ -n "$(git status --porcelain)" ]; then
              git add PKGBUILD .SRCINFO
              git commit -m "Update to $(grep -oP '^pkgver=\K.*' PKGBUILD)"
              git push origin master
            else
              echo "Nenhuma alteração real detectada no clone do AUR."
            fi
            
            # Volta para o diretório original do workflow
            cd -
          done