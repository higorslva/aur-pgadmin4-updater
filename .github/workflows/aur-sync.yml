name: Sync AUR Packages

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  check-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests packaging

      - name: Run Update Script
        id: update_script
        run: python scripts/update_packages.py

      - name: Deploy Updates to AUR
        if: steps.update_script.outputs.updated_dirs != ''
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          # Configuração SSH
          mkdir -p ~/.ssh
          echo "$AUR_SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -t ed25519 aur.archlinux.org >> ~/.ssh/known_hosts

          git config --global user.name "Higor Souza"
          git config --global user.email "higor.slva@outlook.com"

          # Loop pelas pastas que foram atualizadas
          IFS=',' read -ra DIRS <<< "${{ steps.update_script.outputs.updated_dirs }}"
          for DIR in "${DIRS[@]}"; do
            echo "Processando $DIR..."
            
            # Gerar .SRCINFO usando Docker (Arch Linux)
            docker run --rm -v $(pwd):/pkg archlinux:latest bash -c "
              pacman -Sy --noconfirm binutils sudo &&
              cd /pkg/$DIR &&
              chmod -R 777 . &&
              sudo -u base makepkg --printsrcinfo > .SRCINFO
            "

            # Push para o AUR
            cd $DIR
            git init
            git remote add aur "ssh://aur@aur.archlinux.org/$DIR.git"
            git add PKGBUILD .SRCINFO
            git commit -m "Update to $(grep -oP '^pkgver=\K.*' PKGBUILD)"
            git push aur master --force
            cd ..
          done
